<svg xmlns="http://www.w3.org/2000/svg" viewBox="-30 0 930 440" font-family="sans-serif">
  <style>
    .axis { stroke: #111; stroke-width: 1.5; fill: none; }
    .curve { stroke: #111; stroke-width: 3; fill: none; stroke-linejoin: round; }
    .guide { stroke: #111; stroke-width: 1; fill: none; stroke-dasharray: 4 4; opacity: 0.45; }
    .tick { font-size: 13px; fill: #111; }
    .label { font-size: 13px; fill: #111; }
    .axis-title { font-size: 14px; fill: #111; font-weight: 600; }
    .segment { font-size: 13px; fill: #111; font-style: italic; }
    .dot { fill: #111; }
    .title { font-size: 14px; fill: #111; font-weight: 600; }
  </style>

  <!-- Title/caption noting the asset this example is based on -->
  <text class="title" x="360" y="25" text-anchor="middle">USDC on CoreHub: base 0%, slope 1 4%, slope 2 20%, optimal 92%</text>

  <!-- Y axis -->
  <line class="axis" x1="60" y1="40" x2="60" y2="380" />
  <!-- X axis -->
  <line class="axis" x1="60" y1="380" x2="660" y2="380" />

  <!-- Curve: (0% util, 0%) тЖТ (92% util, 4%) тЖТ (100% util, 24%) -->
  <!-- x: 0%тЖТ60, 92%тЖТ612, 100%тЖТ660. y: 0%тЖТ380, 4%тЖТ323, 24%тЖТ40. -->
  <polyline class="curve" points="60,380 612,323 660,40" />

  <!-- Dots at the named points -->
  <circle class="dot" cx="60" cy="380" r="4" />
  <circle class="dot" cx="612" cy="323" r="4" />
  <circle class="dot" cx="660" cy="40" r="4" />

  <!-- Vertical dashed guide at optimal utilization -->
  <line class="guide" x1="612" y1="323" x2="612" y2="380" />
  <!-- Horizontal dashed guide at base + slope 1 (4%) -->
  <line class="guide" x1="60" y1="323" x2="612" y2="323" />
  <!-- Horizontal dashed guide at base + slope 1 + slope 2 (24%) -->
  <line class="guide" x1="60" y1="40" x2="660" y2="40" />

  <!-- Rate labels to the right of the curve -->
  <text class="label" x="670" y="45">base + slope 1 + slope 2 = 24%</text>
  <text class="label" x="670" y="328">base + slope 1 = 4%</text>
  <text class="label" x="55" y="385" text-anchor="end">base = 0%</text>

  <!-- X-axis ticks -->
  <text class="tick" x="60" y="400" text-anchor="middle">0%</text>
  <text class="tick" x="612" y="400" text-anchor="middle">optimal = 92%</text>
  <text class="tick" x="660" y="415" text-anchor="middle">100%</text>

  <!-- Axis titles -->
  <text class="axis-title" x="360" y="430" text-anchor="middle">utilization</text>
  <text class="axis-title" x="20" y="210" text-anchor="middle" transform="rotate(-90 20 210)">borrow rate</text>

  <!-- Segment labels -->
  <text class="segment" x="340" y="365" text-anchor="middle">slope 1 = 4%</text>
  <text class="segment" x="700" y="200" text-anchor="middle">slope 2 = 20%</text>
</svg>
