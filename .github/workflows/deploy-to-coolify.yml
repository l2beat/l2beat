name: Deploy to Coolify

on:
  workflow_call:
    secrets:
      COOLIFY_SERVER:
        required: true
      COOLIFY_DEPLOY_API_KEY:
        required: true
      COOLIFY_UUID:
        required: true

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to Coolify
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      COOLIFY_SERVER: ${{ secrets.COOLIFY_SERVER }}
      COOLIFY_API_KEY: ${{ secrets.COOLIFY_DEPLOY_API_KEY }}
      COOLIFY_UUID: ${{ secrets.COOLIFY_UUID }}
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Deploy to Coolify
        run: |
          response="$(
            curl --fail-with-body --silent --show-error \
              --retry 3 \
              --retry-delay 5 \
              --retry-all-errors \
              --header "Authorization: Bearer $COOLIFY_API_KEY" \
              --header "Accept: application/json" \
              "$COOLIFY_SERVER/api/v1/deploy?uuid=$COOLIFY_UUID"
          )"

          echo "$response" | jq -e '.deployments | length > 0' >/dev/null
          echo "$response"
