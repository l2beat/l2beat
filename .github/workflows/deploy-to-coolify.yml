name: Deploy to Coolify

on:
  workflow_call:
    inputs:
      pr:
        description: "Pull request number for a preview deployment"
        required: false
        type: string
        default: ''
    secrets:
      COOLIFY_SERVER:
        required: true
      COOLIFY_DEPLOY_API_KEY:
        required: true
      COOLIFY_UUID:
        required: true

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to Coolify
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      COOLIFY_SERVER: ${{ secrets.COOLIFY_SERVER }}
      COOLIFY_API_KEY: ${{ secrets.COOLIFY_DEPLOY_API_KEY }}
    steps:
      - name: Trigger Coolify deployment
        env:
          COOLIFY_PR: ${{ inputs.pr }}
          COOLIFY_UUID: ${{ secrets.COOLIFY_UUID }}
        run: |
          set -euo pipefail

          server="${COOLIFY_SERVER%/}"
          case "$server" in
            */api/v1) api_url="$server/deploy" ;;
            */api) api_url="$server/v1/deploy" ;;
            *) api_url="$server/api/v1/deploy" ;;
          esac

          message="Deploying resource $COOLIFY_UUID"

          if [ -n "$COOLIFY_PR" ]; then
            message="Deploying PR preview #$COOLIFY_PR for resource $COOLIFY_UUID"
          fi

          echo "$message"

          curl_args=(
            --fail-with-body
            --silent
            --show-error
            --request GET
            --get
            --header "Authorization: Bearer $COOLIFY_API_KEY"
            --header "Accept: application/json"
            --data-urlencode "uuid=$COOLIFY_UUID"
          )

          if [ -n "$COOLIFY_PR" ]; then
            curl_args+=(--data-urlencode "pr=$COOLIFY_PR")
          fi

          curl "${curl_args[@]}" "$api_url"
