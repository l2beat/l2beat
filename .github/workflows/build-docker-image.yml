name: Build and Push Docker Image

on:
  workflow_call:
    inputs:
      project:
        description: "Project name (e.g., frontend, backend, disco-ui)"
        required: true
        type: string
      dockerfile:
        description: "Dockerfile path (e.g., packages/frontend/Dockerfile)"
        required: true
        type: string
      extra_build_args:
        description: "Additional Docker build args passed to docker/build-push-action"
        required: false
        default: ""
        type: string
    secrets:
      TURBO_TOKEN:
        required: true
      TURBO_TEAM:
        required: false
      TURBO_API:
        required: false

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build and push ${{ inputs.project }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
      TURBO_API: ${{ secrets.TURBO_API }}
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Docker.io mirror
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c  # v4
        with:
          buildkitd-config-inline: |
            [registry."docker.io"]
              mirrors = ["mirror.gcr.io"]

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0  # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a  # v7
        with:
          context: .
          file: ${{ inputs.dockerfile }}
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/${{ inputs.project }}:latest
            ghcr.io/${{ github.repository }}/${{ inputs.project }}:${{ github.sha }}
          build-args: |
            TURBO_TEAM=${{ secrets.TURBO_TEAM }}
            ${{ inputs.extra_build_args }}
          secrets: |
            TURBO_TOKEN=${{ secrets.TURBO_TOKEN }}
            TURBO_API=${{ secrets.TURBO_API }}
          no-cache: true
