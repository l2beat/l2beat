<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>DeFiScan V2 Documentation</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta
      name="description"
      content="DeFiScan V2 - DeFi Protocol Analysis Documentation"
    />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, minimum-scale=1.0"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css"
    />
    <style>
      :root {
        --theme-color: #8b5cf6;
      }

      /* Sidebar styling */
      .sidebar {
        border-right: 1px solid #e8e8e8;
      }

      .sidebar-nav a {
        color: #333;
      }

      .sidebar-nav a:hover,
      .sidebar-nav a.active {
        color: #8b5cf6;
      }

      /* Links */
      .markdown-section a {
        color: #8b5cf6;
      }

      .markdown-section a:hover {
        color: #7c3aed;
      }

      /* Code blocks */
      .markdown-section code {
        background-color: #f5f3ff;
        color: #5b21b6;
      }

    </style>
  </head>
  <body>
    <div id="app"></div>
    <script>
      window.$docsify = {
        name: "DeFiScan V2",
        repo: "",
        loadSidebar: true,
        subMaxLevel: 2,
        coverpage: false,
        search: {
          placeholder: "Search",
          noData: "No results",
          depth: 3,
        },
      };
    </script>
    <!-- Docsify core -->
    <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
    <!-- Search plugin -->
    <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  </body>
</html>
